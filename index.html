<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Srivalsan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* Stars canvas */
    #stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Nebula glow overlays */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0;
      animation: nebulaFade 4s ease-in forwards;
      z-index: 1;
      pointer-events: none;
    }

    .nebula-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(90, 50, 180, 0.15), transparent 70%);
      top: 10%;
      left: -5%;
      animation-delay: 1s;
    }

    .nebula-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(30, 80, 170, 0.12), transparent 70%);
      bottom: 5%;
      right: -5%;
      animation-delay: 2s;
    }

    .nebula-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(120, 40, 100, 0.1), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 0.5s;
    }

    @keyframes nebulaFade {
      to { opacity: 1; }
    }

    /* Signature container */
    #signature-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 70vw;
      max-width: 450px;
    }

    #signature-svg {
      width: 100%;
      height: auto;
      overflow: visible;
      filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.15));
    }

    /* Banana container */
    .banana {
      position: fixed;
      font-size: 40px;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      animation: bananaPop 2.5s ease-out forwards;
      user-select: none;
    }

    @keyframes bananaPop {
      0% {
        opacity: 0;
        transform: scale(0) rotate(0deg);
      }
      15% {
        opacity: 1;
        transform: scale(1.3) rotate(20deg);
      }
      30% {
        transform: scale(1) rotate(-10deg);
      }
      70% {
        opacity: 1;
        transform: scale(1) rotate(5deg);
      }
      100% {
        opacity: 0;
        transform: scale(0.8) rotate(-15deg) translateY(-30px);
      }
    }

    @media (max-width: 600px) {
      #signature-wrap {
        width: 80vw;
      }

      .banana {
        font-size: 30px;
      }

      .nebula {
        filter: blur(80px);
      }

      .nebula-1 { width: 300px; height: 300px; }
      .nebula-2 { width: 250px; height: 250px; }
      .nebula-3 { width: 200px; height: 200px; }
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>

  <div id="signature-wrap">
    <svg id="signature-svg" viewBox="0 0 285 100" preserveAspectRatio="xMidYMid meet">
      <!-- S -->
      <path class="sig-letter" d="M30,25 Q10,20 8,35 Q6,48 28,50 Q50,52 48,67 Q46,82 22,78"
            fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- r -->
      <path class="sig-letter" d="M62,40 L62,78 M62,55 Q62,40 78,40"
            fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- i -->
      <path class="sig-letter" d="M90,40 L90,78 M90,28 L90,30"
            fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- v -->
      <path class="sig-letter" d="M102,40 L112,78 L122,40"
            fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- a -->
      <path class="sig-letter" d="M140,50 Q140,40 148,40 Q156,40 156,50 L156,78 M156,50 Q156,78 140,78 Q132,78 140,50"
            fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- l -->
      <path class="sig-letter" d="M170,18 L170,78"
            fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- s -->
      <path class="sig-letter" d="M192,46 Q184,40 184,48 Q184,55 192,57 Q200,59 200,67 Q200,78 192,76"
            fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- a -->
      <path class="sig-letter" d="M218,50 Q218,40 226,40 Q234,40 234,50 L234,78 M234,50 Q234,78 218,78 Q210,78 218,50"
            fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- n -->
      <path class="sig-letter" d="M250,78 L250,43 Q250,40 258,40 Q272,40 272,52 L272,78"
            fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Underline flourish — matches text width only -->
      <path class="sig-letter" d="M8,90 Q70,86 140,88 Q210,90 275,85"
            fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    </svg>
  </div>

  <script>
    // --- Twinkling stars ---
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const stars = [];
    const STAR_COUNT = 300;

    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.8 + 0.2,
        baseAlpha: Math.random() * 0.6 + 0.2,
        alpha: 0,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        phase: Math.random() * Math.PI * 2,
        // Slight color tint for some stars
        color: Math.random() > 0.85
          ? `hsl(${Math.floor(Math.random() * 60 + 200)}, 60%, 85%)`
          : '#fff',
      });
    }

    // Shooting stars
    const shootingStars = [];

    function maybeSpawnShootingStar() {
      if (Math.random() < 0.003 && shootingStars.length < 2) {
        shootingStars.push({
          x: Math.random() * canvas.width * 0.8,
          y: Math.random() * canvas.height * 0.4,
          vx: 4 + Math.random() * 4,
          vy: 2 + Math.random() * 2,
          life: 1,
          decay: 0.015 + Math.random() * 0.01,
          length: 40 + Math.random() * 60,
        });
      }
    }

    let time = 0;
    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      time += 1;

      // Draw stars
      for (const s of stars) {
        s.alpha = s.baseAlpha + Math.sin(time * s.twinkleSpeed + s.phase) * 0.3;
        s.alpha = Math.max(0, Math.min(1, s.alpha));

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.globalAlpha = s.alpha;
        ctx.fill();
      }

      // Shooting stars
      maybeSpawnShootingStar();
      ctx.globalAlpha = 1;
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const ss = shootingStars[i];
        ss.x += ss.vx;
        ss.y += ss.vy;
        ss.life -= ss.decay;

        if (ss.life <= 0) {
          shootingStars.splice(i, 1);
          continue;
        }

        const tailX = ss.x - (ss.vx / Math.sqrt(ss.vx * ss.vx + ss.vy * ss.vy)) * ss.length;
        const tailY = ss.y - (ss.vy / Math.sqrt(ss.vx * ss.vx + ss.vy * ss.vy)) * ss.length;

        const grad = ctx.createLinearGradient(tailX, tailY, ss.x, ss.y);
        grad.addColorStop(0, `rgba(255,255,255,0)`);
        grad.addColorStop(1, `rgba(255,255,255,${ss.life})`);

        ctx.beginPath();
        ctx.moveTo(tailX, tailY);
        ctx.lineTo(ss.x, ss.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(drawStars);
    }
    drawStars();

    // --- Signature draw-in animation ---
    const sigLetters = document.querySelectorAll('.sig-letter');
    sigLetters.forEach(path => {
      const length = path.getTotalLength();
      path.style.strokeDasharray = length;
      path.style.strokeDashoffset = length;
    });

    // Start signature after a brief pause
    setTimeout(() => {
      let delay = 0;
      sigLetters.forEach((path) => {
        const length = path.getTotalLength();
        const duration = Math.max(250, length * 5);

        setTimeout(() => {
          path.style.transition = `stroke-dashoffset ${duration}ms cubic-bezier(0.4, 0, 0.2, 1)`;
          path.style.strokeDashoffset = '0';
        }, delay);

        delay += duration * 0.55;
      });
    }, 800);

    // --- Banana pops ---
    function spawnBanana() {
      const banana = document.createElement('div');
      banana.className = 'banana';
      banana.textContent = '🍌';
      banana.style.left = (Math.random() * 85 + 5) + 'vw';
      banana.style.top = (Math.random() * 80 + 5) + 'vh';
      banana.style.fontSize = (25 + Math.random() * 30) + 'px';
      // Random slight rotation start
      banana.style.animationDuration = (2 + Math.random() * 1.5) + 's';
      document.body.appendChild(banana);

      // Remove after animation
      banana.addEventListener('animationend', () => banana.remove());
    }

    // Start bananas after signature begins drawing
    setTimeout(() => {
      // Initial burst of a few
      for (let i = 0; i < 3; i++) {
        setTimeout(spawnBanana, i * 400);
      }

      // Then keep spawning periodically
      setInterval(() => {
        spawnBanana();
        // Sometimes spawn two at once
        if (Math.random() > 0.6) {
          setTimeout(spawnBanana, 200);
        }
      }, 1800 + Math.random() * 1200);
    }, 2000);
  </script>
</body>
</html>
