<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Srivalsan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      background: #000;
    }

    /* Stars canvas */
    #stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Nebula glow overlays */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0;
      animation: nebulaFade 4s ease-in forwards;
      z-index: 1;
      pointer-events: none;
    }

    .nebula-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(90, 50, 180, 0.15), transparent 70%);
      top: 10%;
      left: -5%;
      animation-delay: 1s;
    }

    .nebula-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(30, 80, 170, 0.12), transparent 70%);
      bottom: 5%;
      right: -5%;
      animation-delay: 2s;
    }

    .nebula-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(120, 40, 100, 0.1), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 0.5s;
    }

    @keyframes nebulaFade {
      to { opacity: 1; }
    }

    /* Signature */
    #signature-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    #signature {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(48px, 12vw, 96px);
      color: white;
      white-space: nowrap;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.12));
      line-height: 1.2;
    }

    #signature .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease-out, transform 0.4s ease-out;
    }

    #signature .letter.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Underline */
    #underline {
      height: 2px;
      background: white;
      opacity: 0;
      width: 0;
      margin-top: 4px;
      border-radius: 1px;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease-out;
    }

    #underline.visible {
      opacity: 0.35;
    }

    /* Banana container */
    .banana {
      position: fixed;
      font-size: 40px;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      animation: bananaPop 2.5s ease-out forwards;
      user-select: none;
    }

    @keyframes bananaPop {
      0% {
        opacity: 0;
        transform: scale(0) rotate(0deg);
      }
      15% {
        opacity: 1;
        transform: scale(1.3) rotate(20deg);
      }
      30% {
        transform: scale(1) rotate(-10deg);
      }
      70% {
        opacity: 1;
        transform: scale(1) rotate(5deg);
      }
      100% {
        opacity: 0;
        transform: scale(0.8) rotate(-15deg) translateY(-30px);
      }
    }

    @media (max-width: 600px) {
      .banana {
        font-size: 30px;
      }

      .nebula {
        filter: blur(80px);
      }

      .nebula-1 { width: 300px; height: 300px; }
      .nebula-2 { width: 250px; height: 250px; }
      .nebula-3 { width: 200px; height: 200px; }
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>

  <div id="signature-wrap">
    <div id="signature"></div>
    <div id="underline"></div>
  </div>

  <script>
    // --- Twinkling stars ---
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const stars = [];
    const STAR_COUNT = 300;

    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.8 + 0.2,
        baseAlpha: Math.random() * 0.6 + 0.2,
        alpha: 0,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        phase: Math.random() * Math.PI * 2,
        color: Math.random() > 0.85
          ? `hsl(${Math.floor(Math.random() * 60 + 200)}, 60%, 85%)`
          : '#fff',
      });
    }

    const shootingStars = [];

    function maybeSpawnShootingStar() {
      if (Math.random() < 0.003 && shootingStars.length < 2) {
        shootingStars.push({
          x: Math.random() * canvas.width * 0.8,
          y: Math.random() * canvas.height * 0.4,
          vx: 4 + Math.random() * 4,
          vy: 2 + Math.random() * 2,
          life: 1,
          decay: 0.015 + Math.random() * 0.01,
          length: 40 + Math.random() * 60,
        });
      }
    }

    let time = 0;
    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      time += 1;

      for (const s of stars) {
        s.alpha = s.baseAlpha + Math.sin(time * s.twinkleSpeed + s.phase) * 0.3;
        s.alpha = Math.max(0, Math.min(1, s.alpha));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.globalAlpha = s.alpha;
        ctx.fill();
      }

      maybeSpawnShootingStar();
      ctx.globalAlpha = 1;
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const ss = shootingStars[i];
        ss.x += ss.vx;
        ss.y += ss.vy;
        ss.life -= ss.decay;

        if (ss.life <= 0) {
          shootingStars.splice(i, 1);
          continue;
        }

        const mag = Math.sqrt(ss.vx * ss.vx + ss.vy * ss.vy);
        const tailX = ss.x - (ss.vx / mag) * ss.length;
        const tailY = ss.y - (ss.vy / mag) * ss.length;

        const grad = ctx.createLinearGradient(tailX, tailY, ss.x, ss.y);
        grad.addColorStop(0, `rgba(255,255,255,0)`);
        grad.addColorStop(1, `rgba(255,255,255,${ss.life})`);

        ctx.beginPath();
        ctx.moveTo(tailX, tailY);
        ctx.lineTo(ss.x, ss.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(drawStars);
    }
    drawStars();

    // --- Letter-by-letter signature reveal ---
    const name = 'Srivalsan';
    const sigEl = document.getElementById('signature');
    const underline = document.getElementById('underline');

    // Create a span for each letter
    const letterSpans = [];
    for (const char of name) {
      const span = document.createElement('span');
      span.className = 'letter';
      span.textContent = char;
      sigEl.appendChild(span);
      letterSpans.push(span);
    }

    // Reveal letters one by one
    setTimeout(() => {
      letterSpans.forEach((span, i) => {
        setTimeout(() => {
          span.classList.add('visible');
        }, i * 150);
      });

      // After all letters, draw the underline to match text width
      setTimeout(() => {
        const textWidth = sigEl.offsetWidth;
        underline.classList.add('visible');
        underline.style.width = textWidth + 'px';
      }, letterSpans.length * 150 + 200);
    }, 800);

    // --- Banana pops ---
    function spawnBanana() {
      const banana = document.createElement('div');
      banana.className = 'banana';
      banana.textContent = '\u{1F34C}';
      banana.style.left = (Math.random() * 85 + 5) + 'vw';
      banana.style.top = (Math.random() * 80 + 5) + 'vh';
      banana.style.fontSize = (25 + Math.random() * 30) + 'px';
      banana.style.animationDuration = (2 + Math.random() * 1.5) + 's';
      document.body.appendChild(banana);
      banana.addEventListener('animationend', () => banana.remove());
    }

    setTimeout(() => {
      for (let i = 0; i < 3; i++) {
        setTimeout(spawnBanana, i * 400);
      }

      setInterval(() => {
        spawnBanana();
        if (Math.random() > 0.6) {
          setTimeout(spawnBanana, 200);
        }
      }, 1800 + Math.random() * 1200);
    }, 2000);
  </script>
</body>
</html>
